<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Edit Account | MoreChats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'brand-blue': '#0056b3', 'brand-gold': '#ffd12b', 'brand-dark': '#002b5a' },
                    backgroundImage: { 'happy-gradient': 'linear-gradient(135deg, #0056b3 0%, #002b5a 100%)' }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body class="font-lexend bg-slate-50 text-slate-800">
    <div class="flex min-h-screen">
        <aside class="w-80 bg-white border-r border-slate-200 hidden lg:flex flex-col p-8">
            <div class="flex items-center gap-3 mb-12">
                <div class="w-10 h-10 bg-brand-blue rounded-xl flex items-center justify-center text-white">
                    <i data-lucide="Zap" class="fill-current"></i>
                </div>
                <span class="text-xl font-extrabold tracking-tighter text-brand-dark">MoreChats</span>
            </div>
            <nav class="space-y-1">
                <a href="#" class="flex items-center gap-3 p-3 bg-brand-blue/5 text-brand-blue rounded-xl font-bold">
                    <i data-lucide="user" class="w-5 h-5"></i> Profile Info
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-slate-500 hover:bg-slate-50 rounded-xl transition">
                    <i data-lucide="bell" class="w-5 h-5"></i> Notifications
                </a>
                <a href="#" class="flex items-center gap-3 p-3 text-slate-500 hover:bg-slate-50 rounded-xl transition">
                    <i data-lucide="shield-check" class="w-5 h-5"></i> Security
                </a>
            </nav>
            <div class="mt-auto">
                <button onclick="location.href='dashboard.html'"
                    class="flex items-center gap-3 p-3 text-red-500 hover:bg-red-50 rounded-xl transition w-full font-bold">
                    <i data-lucide="arrow-left" class="w-5 h-5"></i> Back to Chats
                </button>
            </div>
        </aside>

        <main class="flex-1 p-6 md:p-16 max-w-5xl">
            <div class="mb-12">
                <h1 class="text-4xl font-extrabold tracking-tight mb-2">Account Settings</h1>
                <p class="text-slate-500">Update your profile and how people see you on the platform.</p>
            </div>

            <form class="space-y-10">
                <div
                    class="flex flex-col md:flex-row items-center gap-8 p-8 bg-white rounded-3xl border border-slate-200 shadow-sm">
                    <div class="relative">
                        <div
                            class="w-24 h-24 bg-brand-blue text-white rounded-[32px] flex items-center justify-center text-3xl font-bold shadow-xl border-4 border-white">
                            TM
                        </div>
                        <button type="button"
                            class="absolute -bottom-2 -right-2 p-2 bg-brand-gold text-brand-dark rounded-xl shadow-lg hover:scale-110 transition">
                            <i data-lucide="camera" class="w-4 h-4"></i>
                        </button>
                    </div>
                    <div class="text-center md:text-left">
                        <h4 class="font-bold text-lg">Your Profile Picture</h4>
                        <p class="text-sm text-slate-500 mb-4">We recommend an image of at least 400x400px.</p>
                        <div class="flex gap-3 justify-center md:justify-start">
                            <button
                                class="text-sm font-bold bg-slate-100 px-4 py-2 rounded-lg hover:bg-slate-200 transition">Upload
                                New</button>
                            <button
                                class="text-sm font-bold text-red-500 px-4 py-2 hover:bg-red-50 rounded-lg transition">Remove</button>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Display
                            Name</label>
                        <input type="text" placeholder="e.g. Maverick"
                            class="w-full p-4 bg-white border border-slate-200 rounded-2xl focus:border-brand-blue focus:ring-4 focus:ring-brand-blue/5 outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Email
                            Address</label>
                        <input type="email" placeholder="maverick@example.com"
                            class="w-full p-4 bg-white border border-slate-200 rounded-2xl focus:border-brand-blue focus:ring-4 focus:ring-brand-blue/5 outline-none transition-all">
                    </div>
                    <div class="space-y-2 md:col-span-2">
                        <label class="text-xs font-bold uppercase tracking-widest text-slate-400 ml-1">Bio</label>
                        <textarea rows="3"
                            class="w-full p-4 bg-white border border-slate-200 rounded-2xl focus:border-brand-blue focus:ring-4 focus:ring-brand-blue/5 outline-none transition-all resize-none"
                            placeholder="Tell us a bit about yourself..."></textarea>
                    </div>
                </div>

                <div class="pt-8 border-t border-slate-200">
                    <h4 class="text-red-500 font-bold mb-4">Danger Zone</h4>
                    <div class="p-6 border border-red-100 bg-red-50/30 rounded-2xl flex justify-between items-center">
                        <div>
                            <p class="font-bold text-sm">Delete Account</p>
                            <p class="text-xs text-slate-500">Permanently remove all your data and chats.</p>
                        </div>
                        <button type="button"
                            class="text-xs font-bold text-red-600 border border-red-200 px-4 py-2 rounded-xl hover:bg-red-600 hover:text-white transition">Delete</button>
                    </div>
                </div>

                <div
                    class="flex items-center justify-end gap-4 bg-white p-6 border-t border-slate-100 -mx-6 md:-mx-16 sticky bottom-0">
                    <button type="button"
                        class="px-8 py-3 font-bold text-slate-500 hover:text-slate-800 transition">Discard</button>
                    <button type="submit"
                        class="px-10 py-3 bg-brand-blue text-white rounded-xl font-bold shadow-lg shadow-brand-blue/30 hover:bg-brand-dark hover:-translate-y-0.5 transition-all">Save
                        Changes</button>
                </div>
            </form>
        </main>
    </div>
    <script>lucide.createIcons();</script>
</body>

</html>
