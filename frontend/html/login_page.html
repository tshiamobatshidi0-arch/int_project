<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MoreChats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'brand-blue': '#0056b3', 'brand-gold': '#ffd12b' },
                    backgroundImage: { 'happy-gradient': 'linear-gradient(135deg, #0056b3 0%, #002b5a 100%)' },
                    fontFamily: { lexend: ['Lexend', 'sans-serif'] },
                    animation: { 'float': 'float 6s ease-in-out infinite' },
                    keyframes: { float: { '0%, 100%': { transform: 'translateY(0)' }, '50%': { transform: 'translateY(-20px)' } } }
                }
            }
        }
    </script>
</head>

<body class="font-lexend bg-white overflow-hidden">
    <div class="grid grid-cols-1 md:grid-cols-[45%_55%] h-screen">
        <div class="bg-happy-gradient flex flex-col items-center justify-center text-white p-10 text-center">
            <div
                class="animate-float w-32 h-32 bg-white rounded-[30px] shadow-2xl flex items-center justify-center mb-8 border-4 border-white/20">
                <img src="../Assets/images/logo.jpg" class="w-20 rounded-lg">
            </div>
            <h1 class="text-4xl font-extrabold tracking-tight">Welcome Back</h1>
        </div>

        <div class="flex items-center justify-center p-10">
            <div class="w-full max-w-md">
                <h2 class="text-3xl font-extrabold mb-2 text-slate-800">Login In</h2>
                <p class="text-slate-400 mb-10 font-medium">Enter your credentials to access your dashboard.</p>

                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="font-bold text-xs uppercase text-slate-400 tracking-widest">Number:</label>
                        <input type="tel" placeholder="+27 12 345 6789"
                            class="w-full p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 focus:border-brand-blue focus:bg-white outline-none transition-all">
                    </div>
                    <div class="space-y-2">
                        <label class="font-bold text-xs uppercase text-slate-400 tracking-widest">Email:</label>
                        <input type="email" placeholder="client@gmail.com"
                            class="w-full p-4 rounded-2xl border-2 border-slate-100 bg-slate-50 focus:border-brand-blue focus:bg-white outline-none transition-all">
                    </div>
                    <button
                        class="w-full py-4 bg-brand-blue text-white rounded-full font-bold shadow-xl hover:bg-brand-dark transition-all transform active:scale-95"
                        onclick="location.href='dashboard.html'">Continue</button>
                    <div class="text-center pt-4">
                        <a href="sign_in_page.html" class="text-brand-blue font-bold text-sm hover:underline">No
                            account? Create one</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
