<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="../css/login.css" />
</head>

<body>
    <div class="wrapper">
        <div class="left-side">
            <div class="brand-logo">
                <img src="../Assets/images/logo.jpg" alt="MoreChats Logo">
            </div>
            <h1>Welcome Back</h1>
        </div>
        <div class="right-side">
            <div class="login-container">
                <h2>Login In</h2>
                <p>Enter your phone number to access your dashboard.</p>

                <div class="form-group">
                    <label for="phone">Number:</label>
                    <input type="tel" id="phone" placeholder="+27 12 345 6789" required>
                    <label for="email">Email:</label>
                    <input type="email" id="email" placeholder="client@gmail.com" required>
                </div>

                <button class="submit-btn" onclick="">Continue</button>
                <a href="sign_in_page.html">No account? Create one</a>
            </div>
        </div>
    </div>
    </div>
</body>

</html>
