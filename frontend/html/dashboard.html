<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dashboard | MoreChats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'brand-blue': '#0056b3', 'brand-gold': '#ffd12b', 'brand-dark': '#002b5a' },
                    fontFamily: { lexend: ['Lexend', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body,
        html {
            height: 100%;
            overflow: hidden;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;
        }

        .message-appear {
            animation: flyIn 0.3s cubic-bezier(0.17, 0.89, 0.32, 1.28) forwards;
        }

        @keyframes flyIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.9);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>

<body class="font-lexend bg-slate-50 text-slate-800">
    <div class="flex h-full w-full overflow-hidden">

        <aside
            class="bg-brand-dark flex flex-col py-8 items-center justify-between z-30 shadow-2xl h-full w-20 shrink-0">
            <div class="flex flex-col gap-8">
                <div
                    class="w-12 h-12 rounded-2xl bg-[url('https://images.unsplash.com/photo-1535713875002-d1d0cf377fde?w=100&q=80')] bg-cover border-2 border-brand-gold shadow-lg">
                </div>
                <nav class="flex flex-col gap-6 text-slate-400">
                    <button class="text-white bg-white/10 p-3 rounded-xl shadow-lg"><i
                            data-lucide="message-square"></i></button>
                    <button class="hover:text-brand-gold p-3 transition-colors"><i data-lucide="users"></i></button>
                </nav>
            </div>
            <a href="edit_account.html"
                class="w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center hover:bg-brand-gold hover:text-brand-dark transition-all text-white group">
                <i data-lucide="settings" class="group-hover:rotate-90 transition-transform"></i>
            </a>
        </aside>

        <section class="bg-white border-r border-slate-200 flex flex-col h-full w-80 shrink-0 hidden lg:flex">
            <div class="p-6 border-b border-slate-50">
                <h2 class="text-[10px] font-extrabold uppercase tracking-widest text-brand-blue mb-1">MoreChats</h2>
                <p class="font-bold text-sm text-brand-dark">Conversations</p>
            </div>

            <div class="flex-1 overflow-y-auto p-4 space-y-4">
                <div
                    class="p-4 bg-brand-blue/5 rounded-2xl border-l-4 border-brand-blue shadow-sm cursor-pointer hover:bg-brand-blue/10 transition-all">
                    <span class="font-bold text-sm block text-brand-dark">Media Hub</span>
                    <span class="text-[10px] text-brand-blue font-bold uppercase">Online Now</span>
                </div>
            </div>
        </section>

        <main class="flex-1 flex flex-col h-full relative bg-slate-50 overflow-hidden">
            <header
                class="h-20 bg-white border-b border-slate-200 px-8 flex items-center justify-between shrink-0 z-20">
                <div class="flex items-center gap-4">
                    <div
                        class="w-10 h-10 rounded-xl bg-brand-blue flex items-center justify-center text-white font-bold shadow-md">
                        MH</div>
                    <h3 id="chat-title" class="font-bold text-sm">Media Hub</h3>
                </div>
                <button
                    class="p-3 bg-brand-blue/5 text-brand-blue hover:bg-brand-blue hover:text-white rounded-2xl transition-all shadow-sm">
                    <i data-lucide="phone" class="w-5 h-5"></i>
                </button>
            </header>

            <div id="chat-container" class="flex-1 p-8 overflow-y-auto flex flex-col gap-6">
                <div
                    class="self-start bg-white p-4 rounded-3xl rounded-bl-none shadow-sm border border-slate-100 text-sm max-w-[80%]">
                    Welcome to the **MoreChats** hub. Upload photos or strategy updates below.
                </div>
            </div>

            <div class="p-6 bg-white border-t border-slate-200 shrink-0">
                <div
                    class="max-w-4xl mx-auto flex items-center gap-4 bg-slate-100 rounded-3xl px-6 py-2 focus-within:bg-white focus-within:ring-4 focus-within:ring-brand-blue/5 border border-transparent focus-within:border-slate-200 transition-all">

                    <input type="file" id="photo-input" class="hidden" multiple accept="image/*">
                    <button onclick="document.getElementById('photo-input').click()"
                        class="p-2.5 text-slate-400 hover:text-brand-blue transition-colors">
                        <i data-lucide="camera" class="w-6 h-6"></i>
                    </button>

                    <input type="text" id="message-input" autocomplete="off" placeholder="Type a message..."
                        class="flex-1 bg-transparent py-4 outline-none text-sm font-medium">

                    <button id="send-btn"
                        class="bg-brand-blue text-white p-3.5 rounded-2xl hover:bg-brand-dark transition-all shadow-lg">
                        <i data-lucide="send" class="w-5 h-5"></i>
                    </button>
                </div>
            </div>
        </main>
    </div>

    <script>
        lucide.createIcons();
        const input = document.getElementById('message-input');
        const photoInput = document.getElementById('photo-input');
        const chatContainer = document.getElementById('chat-container');

        function sendMessage() {
            const val = input.value.trim();
            if (!val) return;
            const msg = document.createElement('div');
            msg.className = "self-end bg-brand-blue text-white p-4 px-6 rounded-3xl rounded-br-none shadow-lg max-w-[75%] message-appear text-sm";
            msg.textContent = val;
            chatContainer.appendChild(msg);
            input.value = "";
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function handlePhotos(files) {
            Array.from(files).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                const reader = new FileReader();
                reader.onload = (e) => {
                    const msg = document.createElement('div');
                    msg.className = "self-end message-appear max-w-[320px]";
                    msg.innerHTML = `<div class="rounded-[2rem] overflow-hidden shadow-2xl border-4 border-white">
                                        <img src="${e.target.result}" class="w-full h-auto block">
                                     </div>`;
                    chatContainer.appendChild(msg);
                    chatContainer.scrollTop = chatContainer.scrollHeight;
                };
                reader.readAsDataURL(file);
            });
        }

        photoInput.addEventListener('change', (e) => handlePhotos(e.target.files));
        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });
        document.getElementById('send-btn').addEventListener('click', sendMessage);
    </script>
</body>

</html>
