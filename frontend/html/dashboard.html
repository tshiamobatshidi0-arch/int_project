<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | MoreChats</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: { 'brand-blue': '#0056b3', 'brand-gold': '#ffd12b', 'brand-dark': '#002b5a' },
                    backgroundImage: { 'happy-gradient': 'linear-gradient(135deg, #0056b3 0%, #002b5a 100%)' },
                    fontFamily: { lexend: ['Lexend', 'sans-serif'] }
                }
            }
        }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>

<body class="font-lexend bg-slate-50 overflow-hidden">
    <script src="../javascript/links.js"></script>

    <div class="grid grid-cols-[80px_360px_1fr] h-screen">
        <div class="bg-happy-gradient flex flex-col py-8 items-center justify-between shadow-2xl z-20">
            <div class="flex flex-col gap-6">
                <div class="w-12 h-12 rounded-2xl bg-cover bg-center border-2 border-white/20 shadow-lg"
                    style="background-image: url('../Assets/images/profile_icon.jpg');"></div>
                <div
                    class="w-12 h-12 rounded-2xl bg-white/20 flex items-center justify-center text-white font-bold backdrop-blur-sm">
                    GS</div>
            </div>
            <button onclick="go_to_settings()"
                class="w-12 h-12 bg-brand-gold rounded-2xl flex items-center justify-center shadow-lg hover:rotate-90 transition-transform text-xl">⚙️</button>
        </div>

        <div class="bg-white border-r border-slate-200 flex flex-col shadow-sm">
            <div class="p-6">
                <input type="text" placeholder="Search..."
                    class="w-full bg-slate-100 rounded-full py-3 px-6 outline-none focus:ring-2 focus:ring-brand-blue/20 transition-all">
            </div>
            <div class="flex-1 overflow-y-auto">
                <div class="flex items-center gap-4 p-5 bg-blue-50/50 border-r-4 border-brand-blue cursor-pointer">
                    <div
                        class="w-12 h-12 rounded-full bg-brand-blue/10 flex items-center justify-center text-brand-blue font-bold">
                        CS</div>
                    <div class="flex-1 truncate">
                        <h4 class="font-bold text-sm">CODM Strategy Squad</h4>
                        <p class="text-xs text-slate-500 truncate font-medium">John: Yo! Who's down for some Ranked?</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="flex flex-col relative bg-slate-50">
            <header class="p-6 bg-white border-b border-slate-200 flex justify-between items-center shadow-sm">
                <div>
                    <h3 class="font-extrabold text-lg">CODM Strategy Squad</h3>
                    <p class="text-xs text-green-500 font-bold">8 online</p>
                </div>
            </header>

            <div class="flex-1 p-8 overflow-y-auto flex flex-col gap-4">
                <div
                    class="bg-white p-4 rounded-[20px] rounded-bl-none max-w-[65%] shadow-sm self-start border border-slate-100">
                    <strong class="text-xs text-brand-blue block mb-1">John</strong>
                    <p class="text-sm">Yo! Who's down for some Ranked matches tonight?</p>
                    <span class="text-[10px] text-slate-400 block text-right mt-1 font-bold">9:10 AM</span>
                </div>
                <div class="bg-brand-blue text-white p-4 rounded-[20px] rounded-br-none max-w-[65%] shadow-md self-end">
                    <p class="text-sm">I'm in! Just finishing up school modules first.</p>
                    <span class="text-[10px] opacity-70 block text-right mt-1 font-bold">9:12 AM</span>
                </div>
            </div>

            <div class="h-[90px] bg-white border-t border-slate-200 p-6 flex items-center gap-4">
                <button
                    class="w-10 h-10 rounded-full bg-slate-100 text-slate-500 font-bold hover:bg-brand-gold hover:text-white transition-colors">+</button>
                <input type="text" placeholder="Type a message..."
                    class="flex-1 bg-slate-50 rounded-full px-6 py-3 outline-none focus:bg-white focus:ring-2 focus:ring-brand-blue/10 transition-all border border-transparent focus:border-slate-200">
                <button
                    class="bg-brand-blue text-white px-8 py-3 rounded-full font-bold shadow-lg hover:bg-brand-dark transition-all active:scale-95">Send</button>
            </div>
        </div>
    </div>
</body>

</html>
