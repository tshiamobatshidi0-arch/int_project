<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Lexend', sans-serif;
        }

        .pop-up::before {
            content: "Create an account";
            display: block;
            font-weight: 800;
            font-size: 2rem;
            color: #0056b3;
            text-align: center;
            margin-bottom: 1.5rem;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
        }
    </style>
</head>

<body>
    <div class="sign-in-main w-screen h-screen flex justify-center items-center"
        style="background: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);">
        <div class="pop-up w-[480px] bg-white rounded-[30px] p-[50px] flex flex-col border border-blue-900/5"
            style="box-shadow: 0 30px 60px rgba(0, 86, 179, 0.1);">
            <form action="#">
                <div class="mb-4">
                    <label for="full-name" class="block mb-1 text-sm font-semibold text-slate-700">Full Name</label>
                    <input type="text" id="full-name" placeholder="John Doe" required
                        class="w-full px-4 py-[14px] mb-[15px] rounded-[15px] border-2 border-slate-100 box-border outline-none focus:border-blue-300 transition-colors">
                </div>
                <div class="mb-4">
                    <label for="reg-email" class="block mb-1 text-sm font-semibold text-slate-700">Email:</label>
                    <input type="email" id="reg-email" placeholder="you@morechats.com" required
                        class="w-full px-4 py-[14px] mb-[15px] rounded-[15px] border-2 border-slate-100 box-border outline-none focus:border-blue-300 transition-colors">
                </div>
                <button type="submit"
                    class="submit-btn w-full py-[14px] bg-[#ffd12b] text-slate-900 border-none rounded-full font-extrabold cursor-pointer mt-[10px] transition-all duration-200 hover:bg-[#e6bc27]">
                    Create Account
                </button>
                <a href="login_page.html"
                    class="block text-center text-[0.9rem] mt-[15px] text-[#0056b3] hover:underline">
                    Already have an account? Log in
                </a>
            </form>
        </div>
    </div>
</body>

</html>
