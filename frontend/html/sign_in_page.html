<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=\, initial-scale=1.0">
    <title>Sign In Page</title>
    <link rel="stylesheet" href="../css/sign-up.css">
</head>

<body>

    <body>
        <div class="sign-in-main">
            <div class="pop-up">
                <form action="#">
                    <div class="form-group">
                        <label for="full-name">Full Name</label>
                        <input type="text" id="full-name" placeholder="John Doe" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email:</label>
                        <input type="email" id="reg-phone" placeholder="you@morechats.com" required>
                    </div>
                    <button type="submit" class="submit-btn">Create Account</button>
                    <a href="login_page.html" style="font-size: 0.9rem; margin-top: 15px; color: #0056b3;">Already have
                        an
                        account? Log in</a>
                </form>
            </div>
        </div>
    </body>
</body>

</html>
